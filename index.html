<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Петелька — сайт про в’язання</title>

  <style>
    :root {
      /* Нова палітра */
      --stormy-teal: #16697aff;
      --pacific-blue: #489fb5ff;
      --sky-blue-light: #82c0ccff;
      --parchment: #ede7e3ff;
      --amber-glow: #ffa62bff;

      /* Семантичні змінні на основі нової палітри */
      --bg: var(--parchment);
      --bg-soft: #f7f4f2;
      --cream: #ffffff;
      --text: #0f3d47; /* Дуже темний teal для тексту */
      --muted: var(--stormy-teal);
      --accent: var(--amber-glow);
      --accent-dark: #e08b1a; /* Затемнений бурштин для ховерів */
      --brown: var(--stormy-teal); /* Основний темний колір для заголовків */
      --card: rgba(237, 231, 227, 0.9);
      --shadow: 0 16px 34px rgba(22, 105, 122, 0.15); /* Тінь у тонах stormy-teal */
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.6), transparent 26%),
        radial-gradient(circle at 80% 12%, rgba(255, 166, 43, 0.13), transparent 28%), /* amber */
        radial-gradient(circle at 52% 88%, rgba(72, 159, 181, 0.2), transparent 30%), /* pacific-blue */
        linear-gradient(rgba(22, 105, 122, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 105, 122, 0.04) 1px, transparent 1px);
      background-size: auto, auto, auto, 34px 34px, 34px 34px;
      color: var(--text);
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(22, 105, 122, 0.02) 0,
          rgba(22, 105, 122, 0.02) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity: 0.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page {
      overflow: hidden;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(237, 231, 227, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px dashed rgba(22, 105, 122, 0.18);
    }

    .nav {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--brown);
      letter-spacing: 0.02em;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 35%, var(--cream) 0 16%, transparent 17%),
        repeating-radial-gradient(circle, rgba(22,105,122,0.08) 0 2px, transparent 2px 7px),
        linear-gradient(135deg, var(--sky-blue-light), var(--pacific-blue));
      box-shadow: 0 8px 18px rgba(22, 105, 122, 0.18);
      position: relative;
    }

    .logo-mark::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(22, 105, 122, 0.45);
      border-radius: 50%;
      right: -3px;
      bottom: 2px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 20px;
      list-style: none;
      font-family: Arial, sans-serif;
      font-size: 0.94rem;
      color: var(--muted);
    }

    .menu a {
      position: relative;
      transition: 0.25s ease;
    }

    .menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: 0.25s ease;
    }

    .menu a:hover {
      color: var(--accent);
    }

    .menu a:hover::after {
      width: 100%;
    }

    .nav-button {
      font-family: Arial, sans-serif;
      background: var(--brown);
      color: var(--cream);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      transition: 0.25s ease;
      box-shadow: 0 8px 20px rgba(22, 105, 122, 0.16);
    }

    .nav-button:hover {
      transform: translateY(-2px);
      background: var(--pacific-blue);
    }

    /* HERO */
    .hero {
      padding: 88px 0 72px;
      position: relative;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      align-items: center;
      gap: 44px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.73rem;
      color: var(--accent-dark);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--accent);
    }

    .hero h1 {
      font-size: clamp(3rem, 7vw, 6.7rem);
      line-height: 0.92;
      letter-spacing: -0.06em;
      color: var(--brown);
      margin-bottom: 26px;
    }

    .hero h1 span {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    .hero-text {
      max-width: 570px;
      color: var(--muted);
      font-size: 1.13rem;
      margin-bottom: 32px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 22px;
      border-radius: 999px;
      border: 1px solid rgba(22, 105, 122, 0.18);
      font-family: Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--text); /* Темний текст для кращого контрасту з бурштиновим */
      border-color: var(--accent);
      box-shadow: 0 12px 24px rgba(255, 166, 43, 0.24);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      color: var(--cream);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(237, 231, 227, 0.72);
      color: var(--brown);
      border-style: dashed;
    }

    .btn-secondary:hover {
      background: var(--cream);
      transform: translateY(-2px);
    }

    .hero-note {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .hero-note span {
      background: rgba(237, 231, 227, 0.82);
      border: 1px dashed rgba(22, 105, 122, 0.18);
      padding: 8px 12px;
      border-radius: 999px;
    }

    /* HERO DECOR */
    .yarn-card {
      min-height: 540px;
      border-radius: 38px;
      background:
        radial-gradient(circle at 37% 35%, var(--sky-blue-light) 0 13%, transparent 14%),
        radial-gradient(circle at 62% 46%, var(--amber-glow) 0 11%, transparent 12%),
        radial-gradient(circle at 45% 65%, var(--pacific-blue) 0 15%, transparent 16%),
        linear-gradient(135deg, var(--cream), var(--bg-soft));
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(22, 105, 122, 0.1);
    }

    .yarn-card::before,
    .yarn-card::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 2px dashed rgba(22, 105, 122, 0.18);
    }

    .yarn-card::before {
      width: 330px;
      height: 330px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      box-shadow:
        inset 0 0 0 18px rgba(237, 231, 227, 0.4),
        inset 0 0 0 36px rgba(22, 105, 122, 0.04);
    }

    .yarn-card::after {
      width: 460px;
      height: 460px;
      right: -130px;
      bottom: -120px;
      opacity: 0.5;
    }

    .needle {
      position: absolute;
      width: 420px;
      height: 10px;
      background: linear-gradient(90deg, var(--stormy-teal), var(--sky-blue-light), var(--stormy-teal));
      border-radius: 999px;
      transform: rotate(-34deg);
      left: 38px;
      top: 250px;
      z-index: 2;
      box-shadow: 0 12px 24px rgba(22, 105, 122, 0.25);
    }

    .needle.second {
      transform: rotate(28deg);
      top: 255px;
      left: 78px;
    }

    .floating-label {
      position: absolute;
      z-index: 4;
      background: rgba(237, 231, 227, 0.88);
      border: 1px dashed rgba(22, 105, 122, 0.18);
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(22, 105, 122, 0.15);
      font-family: Arial, sans-serif;
      color: var(--brown);
      font-size: 0.92rem;
    }

    .floating-label::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid rgba(22, 105, 122, 0.14);
      top: 8px;
      right: 10px;
    }

    .floating-label.one {
      left: 28px;
      bottom: 32px;
    }

    .floating-label.two {
      right: 28px;
      top: 34px;
    }

    .floating-label strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 3px;
    }

    /* SECTIONS */
    section {
      padding: 78px 0;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 34px;
    }

    .section-head.center {
      text-align: center;
      margin-left: auto;
      margin-right: auto;
    }

    .section-title {
      font-size: clamp(2.1rem, 4vw, 4rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--brown);
      margin-bottom: 18px;
    }

    .section-text {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .techniques {
      background: rgba(130, 192, 204, 0.1);
      border-top: 1px dashed rgba(22, 105, 122, 0.12);
      border-bottom: 1px dashed rgba(22, 105, 122, 0.12);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .tech-card {
      background: var(--card);
      border: 1px solid rgba(22, 105, 122, 0.1);
      border-radius: 22px;
      padding: 24px 20px;
      box-shadow: 0 12px 26px rgba(22, 105, 122, 0.08);
      transition: 0.25s ease;
      min-height: 230px;
      position: relative;
    }

    .tech-card::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px dashed rgba(22, 105, 122, 0.12);
      border-radius: 16px;
      pointer-events: none;
    }

    .tech-card:hover {
      transform: translateY(-7px) rotate(-0.4deg);
      box-shadow: var(--shadow);
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(72, 159, 181, 0.15);
      color: var(--accent-dark);
      font-size: 1.45rem;
      margin-bottom: 18px;
    }

    .tech-card h3 {
      color: var(--brown);
      font-size: 1.18rem;
      margin-bottom: 10px;
    }

    .tech-card p {
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 0.94rem;
    }

    /* IDEAS */
    .ideas {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 166, 43, 0.18), transparent 32%),
        radial-gradient(circle at 85% 80%, rgba(130, 192, 204, 0.18), transparent 30%),
        var(--brown); /* Stormy Teal background */
      color: var(--cream);
      position: relative;
    }

    .ideas .section-title,
    .ideas .section-text,
    .ideas .eyebrow {
      color: var(--cream);
    }

      background: rgba(255, 255, 255,
